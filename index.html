<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset = "utf-8">
        <meta name="oekaki-web" content="width=device-width, initial-scale=1.0 user-scalable=no">
        <title>お絵描きWeb</title>
        <link rel="stylesheet" href="./css/style.css" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=stylus_note,circle,change_history,square,star&display=block" rel="stylesheet" />
    </head>
    <body>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

        <!---入力用エリア-->
        <div class="input-area">
            <div class="scanners-pannel" id="color-chenge-scanner"></div>
            <div class="color-input-area">
                <div id="black-palette" class="color-change-palette"></div>
                <div id="white-palette" class="color-change-palette"></div>
                <div id="red-palette" class="color-change-palette"></div>
                <div id="blue-palette" class="color-change-palette"></div>
                <div id="yellow-palette" class="color-change-palette"></div>
                <div id="green-palette" class="color-change-palette"></div>
                <!-- <div id="purple-palette" class="color-change-palette"></div> -->
            </div>
            <button type="button" id="save-canvas">
                <span class="material-symbols-outlined">download</span>画像を保存
            </button>
        </div>
        
        <!--キャンバスエリア-->
        <div class="scanners-pannel" id="paint-canvas-scanner"></div>
        <canvas id="canvas"></canvas>

        <!--確認用エリア-->
        <div class="color-check-icons">
            <!--pen-->
            <span id="pen-icon" class="material-symbols-outlined">stylus_note</span>
            <!--●-->
            <span id="circle-icon" class="material-symbols-outlined">circle</span>
            <!--▲-->
            <span id="triangle-icon" class="material-symbols-outlined">change_history</span>
            <!--■-->
            <span id="square-icon" class="material-symbols-outlined">square</span>
            <!--★-->
            <span id="starshape-icon" class="material-symbols-outlined">star</span>
        </div>

        <div class="text" id="text_result">message will be wrote here.</div>

        <button onclick="window.location.href = 'Ver1/Ver1index.html'">旧バージョン</button>
        <script src="js/script.js"></script>
        <script src="js/scanner.js"></script>
        <script src="js/painter.js"></script>
    </body>
</html>
